<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${mode == 'edit' ? 'Sửa sản phẩm' : 'Thêm sản phẩm'}">Form sản phẩm</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        .eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #6d6d6d; margin-bottom: 12px; }
        h1 { color: #111111; margin-bottom: 24px; font-size: 42px; letter-spacing: -0.05em; }
        .form-card { background: rgba(255,255,255,0.9); border-radius: 28px; padding: 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.08); border: 1px solid rgba(17,17,17,0.08); max-width: 720px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-group { margin-bottom: 18px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: #444; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; border: 1px solid rgba(17,17,17,0.12); border-radius: 18px; font-size: 14px; background: #fff; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: rgba(17,17,17,0.26); box-shadow: 0 0 0 4px rgba(17,17,17,0.05); }
        .form-group input[type="file"] { padding: 8px; }
        .error { color: #b00020; font-size: 13px; margin-top: 6px; }
        .btn { display: inline-block; padding: 14px 22px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 14px; cursor: pointer; border: 1px solid rgba(17,17,17,0.12); }
        .btn-primary { background: #111111; color: #fff; border-color: #111111; }
        .btn-secondary { background: #fff; color: #111111; }
        .form-actions { margin-top: 28px; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
        .current-img { margin-top: 8px; }
        .current-img img { width: 88px; height: 88px; object-fit: cover; border-radius: 18px; border: 1px solid rgba(17,17,17,0.08); }
        .current-img span { display: block; font-size: 12px; color: #888; margin-top: 4px; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>

    <div class="eyebrow">Products</div>
    <h1 th:text="${mode == 'edit' ? 'Sửa sản phẩm' : 'Thêm sản phẩm'}">Form sản phẩm</h1>

    <div class="form-card">
        <form th:action="${mode == 'edit'} ? @{/products/edit/{id}(id=${product.id})} : @{/products}"
              method="post" enctype="multipart/form-data" th:object="${product}">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Tên sản phẩm <span style="color:#b00020">*</span></label>
                    <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên sản phẩm" />
                    <div th:if="${#fields.hasErrors('name')}" class="error">
                        <span th:errors="*{name}">Lỗi tên</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="price">Giá sản phẩm (VNĐ) <span style="color:#b00020">*</span></label>
                    <input type="number" id="price" th:field="*{price}" min="1" max="9999999"
                           placeholder="Nhập giá từ 1 - 9,999,999" />
                    <div th:if="${#fields.hasErrors('price')}" class="error">
                        <span th:errors="*{price}">Lỗi giá</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Danh mục <span style="color:#b00020">*</span></label>
                    <select id="category" th:field="*{category.id}">
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Danh mục</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label for="imageFile">Hình ảnh sản phẩm</label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*" />
                    <div th:if="${#fields.hasErrors('image')}" class="error">
                        <span th:errors="*{image}">Lỗi hình ảnh</span>
                    </div>
                    <div th:if="${mode == 'edit' and product.image != null and !product.image.isEmpty()}" class="current-img">
                        <span>Ảnh hiện tại:</span>
                        <img th:src="@{'/uploads/' + ${product.image}}" alt="current image" />
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${mode == 'edit' ? 'Cập nhật' : 'Thêm mới'}">Lưu</button>
                <a th:href="@{/products}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
