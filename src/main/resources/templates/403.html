<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Không có quyền truy cập</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        .forbidden-wrap {
            max-width: 760px;
            margin: 24px auto;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(17,17,17,0.08);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
            padding: 40px;
            text-align: center;
        }
        .code {
            font-size: 72px;
            font-weight: 800;
            color: #111111;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.06em;
        }
        .title {
            font-size: 34px;
            color: #111111;
            margin-bottom: 12px;
            letter-spacing: -0.04em;
        }
        .desc {
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 13px 20px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid rgba(17,17,17,0.12);
        }
        .btn-home {
            background: #111111;
            color: #fff;
            border-color: #111111;
        }
        .btn-back {
            background: #fff;
            color: #111111;
        }
    </style>

    <div class="forbidden-wrap">
        <div class="code">403</div>
        <h1 class="title">Bạn không có quyền truy cập</h1>
        <p class="desc">
            Tài khoản hiện tại không có quyền thực hiện chức năng này.
            Vui lòng đăng nhập bằng tài khoản có quyền ADMIN để tiếp tục.
        </p>
        <div class="actions">
            <a th:href="@{/products}" class="btn btn-home">Quay lại sản phẩm</a>
            <a href="javascript:history.back()" class="btn btn-back">Quay lại trang trước</a>
        </div>
    </div>
</section>
</body>
</html>
