<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Mono Store</title>
    <style>
        :root {
            --text: #111111;
            --muted: #6d6d6d;
            --border: rgba(17,17,17,0.12);
            --panel: rgba(255,255,255,0.82);
            --shadow: 0 24px 60px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(0,0,0,0.08), transparent 28%),
                radial-gradient(circle at bottom right, rgba(0,0,0,0.05), transparent 26%),
                linear-gradient(180deg, #ffffff 0%, #ededea 100%);
        }
        .login-card {
            width: min(100%, 420px);
            padding: 36px;
            border-radius: 28px;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }
        .eyebrow {
            font-size: 11px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 42px;
            line-height: 1;
            letter-spacing: -0.04em;
        }
        .sub {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }
        .message {
            padding: 14px 16px;
            border-radius: 18px;
            margin-bottom: 16px;
            font-size: 14px;
            background: rgba(17,17,17,0.05);
            border: 1px solid rgba(17,17,17,0.12);
        }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }
        .field input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.88);
            font-size: 15px;
        }
        .field input:focus {
            outline: none;
            border-color: rgba(17,17,17,0.28);
            box-shadow: 0 0 0 4px rgba(17,17,17,0.05);
        }
        button {
            width: 100%;
            margin-top: 10px;
            padding: 16px 18px;
            border: none;
            border-radius: 999px;
            background: #111111;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .accounts {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid rgba(17,17,17,0.08);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.8;
        }
        .accounts strong { color: var(--text); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="eyebrow">Mono Store</div>
    <h1>Đăng nhập</h1>
    <p class="sub">Giao diện tối giản cho quản lý sản phẩm, danh mục và giỏ hàng.</p>

    <div th:if="${param.error}" class="message">Sai tên đăng nhập hoặc mật khẩu.</div>
    <div th:if="${param.logout}" class="message">Bạn đã đăng xuất.</div>

    <form th:action="@{/login}" method="post">
        <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Nhập username" />
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Nhập password" />
        </div>
        <button type="submit">Tiếp tục</button>
    </form>

    <div class="accounts">
        <div><strong>Admin:</strong> admin / admin123</div>
        <div><strong>User:</strong> user1 / 123456</div>
    </div>
</div>
</body>
</html>
