<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách danh mục</title>
</head>
<body>
<section layout:fragment="content">
    <style>
        .top-bar { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .eyebrow { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: #6d6d6d; margin-bottom: 10px; }
        h1 { color: #111111; font-size: 48px; letter-spacing: -0.06em; line-height: .95; }
        .sub { margin-top: 12px; color: #666; line-height: 1.7; }
        .btn { display: inline-block; padding: 13px 18px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 14px; cursor: pointer; border: 1px solid rgba(17,17,17,0.12); }
        .btn-primary { background: #111111; color: #fff; border-color: #111111; }
        .btn-danger { background: #fff; color: #111111; }
        .btn-warning { background: #f0f0ed; color: #111111; }
        .btn-sm { padding: 9px 14px; font-size: 13px; }
        .success-msg { background: rgba(17,17,17,0.05); color: #111111; border: 1px solid rgba(17,17,17,0.12); padding: 14px 18px; border-radius: 18px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.88); border-radius: 24px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.06); }
        th { background: #111111; color: #fff; padding: 16px; text-align: left; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid rgba(17,17,17,0.08); font-size: 14px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(17,17,17,0.025); }
        .actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .actions form { margin: 0; }
    </style>

    <div class="top-bar">
        <div>
            <div class="eyebrow">Categories</div>
            <h1>Danh mục</h1>
            <p class="sub">Giữ cấu trúc danh mục gọn, rõ và đồng bộ với luồng lọc sản phẩm.</p>
        </div>
        <a th:href="@{/categories/new}" class="btn btn-primary">Thêm danh mục</a>
    </div>

    <div th:if="${successMessage}" class="success-msg">
        <span th:text="${successMessage}"></span>
    </div>

    <table>
        <thead>
        <tr>
            <th>Mã DM</th>
            <th>Tên danh mục</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}">1</td>
            <td th:text="${category.name}">Tên danh mục</td>
            <td class="actions">
                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                      onsubmit="return confirm('Bạn có chắc muốn xóa danh mục này?');">
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
            <td colspan="3" style="text-align:center; padding: 30px; color: #999;">Chưa có danh mục nào.</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
